<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Pinkie - พร้อมไปต่อไหม</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Itim', cursive; 
            background-color: #FFB6C1;
            margin: 0;
            overflow-x: hidden;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* เปลี่ยนเมาส์เป็นรูป Kuromi */
            cursor: url('https://img.icons8.com/color/32/000000/kuromi.png'), auto;
        }

        button {
            cursor: url('https://img.icons8.com/color/32/000000/kuromi.png'), pointer !important;
        }

        .page-container {
            animation: fadeIn 0.5s ease-in-out;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 1.5rem; /* ปรับ padding ให้ขอบไม่ชนจอบนมือถือ */
            z-index: 10;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation สำหรับพื้นหลัง */
        .bg-element {
            position: fixed;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(-360deg); }
        }

        /* รูปตอนคลิก (ใส่กรอบสีฟ้า/ชมพู และเงาเรืองแสง) */
        .click-img {
            position: fixed;
            pointer-events: none;
            animation: floatText 2s ease-out forwards;
            z-index: 9999;
            object-fit: cover;
            border: 3px solid #2596be; 
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(114, 188, 244, 0.8); 
        }
        @keyframes floatText {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.3); }
        }
    </style>
</head>
<body>

    <div id="bg-elements-container"></div>

    <div class="page-container">
        <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-[90%] sm:max-w-md text-center border-4 border-blue-500 relative min-h-[300px] sm:min-h-[350px] flex flex-col justify-center items-center z-10 transition-all duration-300">
            
            <h2 class="text-2xl sm:text-3xl font-semibold text-pink-500 mb-8 sm:mb-10">คุณพร้อมที่จะไปต่อหรือยัง? </h2>
            
            <div class="flex space-x-4 sm:space-x-6 justify-center w-full relative">
                <button id="btn-yes" onclick="teaseButton(event)" class="bg-gradient-to-r from-pink-400 to-pink-500 text-white font-bold py-2 px-6 sm:py-3 sm:px-8 rounded-full shadow-lg relative transition-all duration-200 text-lg sm:text-xl hover:scale-105 border-2 border-pink-300">
                    กด
                </button>
                
                <button onclick="hideMe(this)" class="bg-gray-300 text-gray-600 font-bold py-2 px-4 sm:py-3 sm:px-6 rounded-full shadow-md transition-all text-lg sm:text-xl hover:bg-gray-400 hover:text-white">
                    ไม่กด
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ฟังก์ชันซ่อนปุ่ม "ไม่กด"
        // ==========================================
        function hideMe(btn) {
            btn.style.opacity = '0';
            setTimeout(() => {
                btn.style.display = 'none';
            }, 300);
        }

        // ==========================================
        // ฟังก์ชันแกล้งปุ่ม "กด" (ขยับไปมา + เปลี่ยนคำ)
        // ==========================================
        let teaseCount = 0;
        let isTeasing = true;
        let textToggle = true; 

        function teaseButton(e) {
            e.stopPropagation(); // ไม่ให้โชว์รูปตอนกดปุ่มนี้
            const btn = document.getElementById('btn-yes');

            if (isTeasing) {
                teaseCount++;
                
                // สลับคำระหว่าง อิอิ กับ งิงิ สลับไปมา
                btn.innerText = textToggle ? 'อิอิ ' : 'งิงิ ';
                textToggle = !textToggle; 

                // จำกัดระยะกระโดดให้แคบลงถ้าเล่นบนมือถือ ปุ่มจะได้ไม่ตกขอบจอ
                const maxMoveX = window.innerWidth < 600 ? 100 : 180;
                const maxMoveY = window.innerWidth < 600 ? 70 : 100;
                
                const randomX = (Math.random() - 0.5) * maxMoveX; 
                const randomY = (Math.random() - 0.5) * maxMoveY; 
                
                btn.style.transform = `translate(${randomX}px, ${randomY}px)`;

                // ถ้าแกล้งครบ 6 ครั้ง ให้ยอมแพ้และกลับมาที่เดิม
                if (teaseCount >= 6) {
                    isTeasing = false;
                    setTimeout(() => {
                        btn.innerText = 'โอเค ยอมแล้ว ไปต่อเลย! ';
                        btn.style.transform = 'translate(0px, 0px)';
                        // เปลี่ยนสีให้ดูเป็นปุ่มตกลงจริงจัง
                        btn.classList.remove('from-pink-400', 'to-pink-500');
                        btn.classList.add('from-green-400', 'to-green-500', 'border-green-300');
                    }, 500);
                }
            } else {
                // พอกดตอนที่เลิกแกล้งแล้ว ให้เปลี่ยนหน้าไปยัง page7.html ทันที!
                window.location.href = 'page7.html'; 
            }
        }

        // ==========================================
        // พื้นหลัง ดาว & หัวใจ & รูปภาพ
        // ==========================================
        const bgContainer = document.getElementById('bg-elements-container');
        const heartSVG = `<svg viewBox="0 0 24 24" width="40" height="40" fill="#ffb6c1" stroke="#d81b60" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const starSVG = `<svg viewBox="0 0 24 24" width="45" height="45" fill="#fff59d" stroke="#f57f17" stroke-width="2"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        const catImage = `<img src="cat1.png" alt="cat" width="150" height="105" style="object-fit: contain;">`;
        const catGifImage = `<img src="cat2.gif" alt="cat gif" width="105" height="100" style="object-fit: contain;">`;
        const catGifImage2 = `<img src="c3.png" alt="cat gif 2" width="100" height="55" style="object-fit: contain;">`;

        function createBgElement(type) {
            const el = document.createElement('div');
            el.className = 'bg-element';
            
            if (type === 'heart') { el.innerHTML = heartSVG; } 
            else if (type === 'star') { el.innerHTML = starSVG; } 
            else if (type === 'cat') { el.innerHTML = catImage; } 
            else if (type === 'catGif') { el.innerHTML = catGifImage; } 
            else if (type === 'catGif2') { el.innerHTML = catGifImage2; }

            const scale = Math.random() * 0.7 + 0.5; 
            el.style.transform = `scale(${scale})`;
            el.style.left = `${Math.random() * 100}vw`;

            const isFloatingUp = Math.random() > 0.5;
            const duration = Math.random() * 20 + 15;
            
            if (isFloatingUp) {
                el.style.animation = `floatUp ${duration}s linear infinite`;
            } else {
                el.style.animation = `floatDown ${duration}s linear infinite`;
            }

            el.style.animationDelay = `-${Math.random() * 50}s`;
            bgContainer.appendChild(el);
        }

        // สร้างอย่างละ 7 อัน
        for (let i = 0; i < 7; i++) {
            createBgElement('heart');   
            createBgElement('star');    
            createBgElement('cat');     
            createBgElement('catGif');  
            createBgElement('catGif2'); 
        }

        // ==========================================
        // เอฟเฟกต์คลิกเมาส์ (แสดงรูป IMG_2604.jpg)
        // ==========================================
        document.addEventListener('click', function(e) {
            const tag = e.target.tagName.toLowerCase();
            if (tag === 'button') {
                return; 
            }

            const imgElement = document.createElement('img');
            imgElement.src = 'IMG_2604.jpg'; 
            imgElement.className = 'click-img';
            
            // ปรับขนาดรูปเด้งให้เล็กลงเวลาคลิกบนมือถือ (จะได้ไม่บังเต็มหน้าจอ)
            const imgSize = window.innerWidth < 600 ? 150 : 250;
            const halfSize = imgSize / 2;
            
            imgElement.style.width = `${imgSize}px`;
            imgElement.style.height = `${imgSize}px`;
            
            // ขยับตำแหน่งให้อยู่ตรงกลางจุดที่คลิกหรือทัช
            imgElement.style.left = `${e.clientX - halfSize}px`; 
            imgElement.style.top = `${e.clientY - halfSize}px`; 

            document.body.appendChild(imgElement);

            // ลบออกเมื่อเวลาผ่านไป 2 วินาที (2000 ms)
            setTimeout(() => {
                imgElement.remove();
            }, 2000);
        });

    </script>
</body>
</html>
